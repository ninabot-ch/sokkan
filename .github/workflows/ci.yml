name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check backend memory cli tests
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt -r memory/requirements.txt -r requirements-dev.txt
      - run: pytest -q

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      - run: docker compose up -d
      - name: wait for /api/health through the web proxy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3009/api/health; then exit 0; fi
            sleep 5
          done
          echo "::error::api never became healthy"
          docker compose logs
          exit 1
      - if: always()
        run: docker compose down -v

  # arm64 is a supported target (Raspberry Pi 5, Apple Silicon, ARM VMs) —
  # cross-build both images under QEMU so a break is caught in CI, not by users.
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - name: build api image (linux/arm64)
        run: docker buildx build --platform linux/arm64 -f docker/api.Dockerfile .
      - name: build web image (linux/arm64)
        run: docker buildx build --platform linux/arm64 -f docker/web.Dockerfile .
