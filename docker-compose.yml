# SOKKAN — self-hosted, single-user by default. See .env.example.
services:
  api:
    build: { context: ., dockerfile: docker/api.Dockerfile }
    restart: unless-stopped
    environment:
      # BYOK — your Anthropic API key (or mount your ~/.claude, see README)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # subscription (Claude Pro/Max): token from `claude setup-token`
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # access token asked on the login screen; leave empty for open access
      # (only do that on a trusted network)
      SOKKAN_LOCAL_TOKEN: ${SOKKAN_LOCAL_TOKEN:-}
      SOKKAN_OWNER_EMAIL: ${SOKKAN_OWNER_EMAIL:-owner@localhost}
      SOKKAN_OWNER_NAME: ${SOKKAN_OWNER_NAME:-Owner}
      SOKKAN_TZ: ${SOKKAN_TZ:-Europe/Zurich}
      SOKKAN_PUBLIC_URL: ${SOKKAN_PUBLIC_URL:-http://localhost:3009}
      SOKKAN_TIER: ${SOKKAN_TIER:-}
      # optional remote embedding service; empty = local ONNX (fastembed)
      ML_SERVICE_URL: ${ML_SERVICE_URL:-}
      # optional model override for spawned sessions (default: CLI default)
      SOKKAN_AGENT_MODEL: ${SOKKAN_AGENT_MODEL:-}
      # included-inference mode (seeded at provisioning): route sessions through
      # the operator gateway instead of a client key. Empty = BYOK.
      SOKKAN_INFER_BASE_URL: ${SOKKAN_INFER_BASE_URL:-}
      SOKKAN_INFER_TOKEN: ${SOKKAN_INFER_TOKEN:-}
      SOKKAN_INFER_MODEL: ${SOKKAN_INFER_MODEL:-}
    volumes:
      - ${SOKKAN_WORKSPACE:-./workspace}:/workspace
      - sokkan-data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8097/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build: { context: ., dockerfile: docker/web.Dockerfile }
    restart: unless-stopped
    environment:
      SOKKAN_API: http://api:8097
    ports:
      - "${SOKKAN_PORT:-3009}:3000"
    depends_on:
      - api
    security_opt:
      - no-new-privileges:true

volumes:
  sokkan-data:
